services:
  - type: web
    name: shared-ledger-api
    env: node
    region: singapore
    plan: free

    rootDir: server

    buildCommand: npm install
    startCommand: npm start

    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: GOOGLE_CLIENT_ID
        sync: false
